name: Build Android Debug APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Gradle যেন বেশি memory না চায় (CI-তে OOM এড়াতে)
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx2g"


    steps:
      # ১. কোড checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ২. JDK 17 setup (Gradle cache সহ)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # ৩. Android SDK setup ও licenses accept
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4


      # ৪. local.properties ফাইল তৈরি (SDK path সহ)
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "✅ local.properties created"
          cat local.properties

      # ৫. .env.example ফাইল তৈরি (secrets plugin-এর জন্য, না থাকলে build fail করে)
      - name: Create .env files
        run: |
          if [ ! -f .env ]; then
            echo "GEMINI_API_KEY=placeholder_for_build" > .env
            echo "✅ .env created (placeholder)"
          fi
          if [ ! -f .env.example ]; then
            echo "GEMINI_API_KEY=your_gemini_api_key_here" > .env.example
            echo "✅ .env.example created"
          fi

      # ৬. google-services.json না থাকলে placeholder তৈরি
      #    (WARN strategy থাকায় build চলবে, কিন্তু plugin error না দেওয়াই ভালো)
      - name: Create placeholder google-services.json if missing
        run: |
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.aistudio.whatsappautomator.xtrqwb"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "AIzaSyPlaceholder000000000000000000000000000" }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF
            echo "✅ Placeholder google-services.json created"
          else
            echo "ℹ️  google-services.json already exists"
          fi

      # ৭. gradlew কে execute permission দেওয়া
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ৮. Gradle কনফিগারেশন ও dependency গুলো cache করা (দ্রুত build-এর জন্য)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ৯. মূল build স্টেপ
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ১০. APK ফাইল artifact হিসেবে আপলোড (৯০ দিন পর্যন্ত download করা যাবে)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-automata-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
          if-no-files-found: error

      # ১১. Build summary (কোন ফাইল কত বড় সেটা দেখাবে)
      - name: Show APK info
        run: |
          echo "## 📦 Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK file:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above ⬆️" >> $GITHUB_STEP_SUMMARY
